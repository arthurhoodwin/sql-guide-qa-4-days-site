<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Песочница — QA ВК Sprint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260523d3" />
  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.11.0/dist/sql-wasm.js"></script>
</head>
<body data-page="sandbox">
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <header class="shell topbar">
    <a class="btn ghost" href="index.html">← На главную</a>
    <span class="chip">Свободная практика SQL</span>
  </header>

  <main class="shell sandbox2-layout">
    <section class="panel sandbox2-main">
      <div class="sandbox-head">
        <h1>SQL-песочница</h1>
        <p>Выбери датасет или загрузи свой, запусти запрос и смотри результат сразу.</p>
      </div>

      <div class="sandbox2-row">
        <label class="field-label" for="dataset">Текущий датасет</label>
        <div class="sandbox2-controls">
          <select id="dataset" class="field-input"></select>
          <button class="btn ghost" id="load-dataset" type="button">Загрузить</button>
          <button class="btn ghost" id="delete-dataset" type="button">Удалить кастомный</button>
        </div>
      </div>

      <div class="sandbox2-controls wrap">
        <button class="btn ghost" id="show-schema" type="button">Схема БД</button>
        <button class="btn ghost" id="preview-table" type="button">Превью таблицы</button>
        <select id="table-picker" class="field-input table-picker"></select>
        <button class="btn ghost" id="run-explain" type="button">EXPLAIN</button>
        <button class="btn ghost" id="format-sql" type="button">Форматировать SQL</button>
        <button class="btn ghost" id="reset-db" type="button">Сброс БД</button>
        <button class="btn ghost" id="reset-sql" type="button">Очистить SQL</button>
        <button class="btn ghost" id="clear-history" type="button">Очистить историю</button>
      </div>

      <section class="snippet-bank" id="snippet-bank"></section>

      <textarea id="sandbox-sql" class="sandbox-sql" spellcheck="false" placeholder="Пиши SQL здесь... (Ctrl/Cmd + Enter — выполнить)"></textarea>
      <div class="workbench-actions">
        <button class="btn primary" id="run-sql" type="button">Run SQL</button>
      </div>

      <div id="sandbox-status" class="check-status"></div>
      <div id="sandbox-result" class="sql-result"></div>
    </section>

    <section class="panel sandbox2-side">
      <h2>Добавить новый датасет</h2>
      <p class="sandbox2-note">Вставь SQL-скрипт и сохрани как отдельный датасет.</p>

      <label class="field-label" for="new-dataset-id">ID датасета (латиница/цифры/_)</label>
      <input id="new-dataset-id" class="field-input" placeholder="например: fintech" />

      <label class="field-label" for="new-dataset-name">Название</label>
      <input id="new-dataset-name" class="field-input" placeholder="например: FinTech кейс" />

      <label class="field-label" for="new-dataset-sql">SQL-скрипт инициализации</label>
      <textarea id="new-dataset-sql" class="field-text" placeholder="CREATE TABLE ...; INSERT INTO ...;"></textarea>

      <div class="workbench-actions">
        <button class="btn primary" id="save-dataset" type="button">Сохранить датасет</button>
        <button class="btn ghost" id="import-datasets" type="button">Импорт JSON</button>
        <button class="btn ghost" id="export-datasets" type="button">Экспорт JSON</button>
      </div>
      <input id="import-datasets-file" type="file" accept="application/json" hidden />

      <h3>История запусков</h3>
      <div id="history-list" class="history-list"></div>
    </section>

    <section class="panel sandbox2-tasks">
      <div class="sandbox2-task-head">
        <h2>Банк задач (доп. практика)</h2>
        <div class="sandbox2-controls">
          <select id="task-dataset-filter" class="field-input"></select>
          <select id="task-level-filter" class="field-input">
            <option value="all">Любой уровень</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
          <button class="btn ghost" id="task-random" type="button">Случайная задача</button>
        </div>
      </div>
      <div id="task-bank-list" class="task-bank-list"></div>
    </section>
  </main>

  <script src="sandbox.js?v=20260523s3"></script>
</body>
</html>
